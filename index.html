  <!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>보컬 연습 계기판</title>

<style>
:root{
--bg:#0c0f14;
--panel:#151a22;
--panel2:#10141b;
--text:#f4f7fb;
--muted:#9aa6b8;
--line:#273142;
--accent:#9ee7ff;
--good:#a8ffbf;
}

*{box-sizing:border-box}
html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
background:radial-gradient(circle at 20% 0%,#22334d,#0c0f14 42%);
color:var(--text);
}

.wrap{
height:100dvh;
display:grid;
grid-template-rows:auto 1fr 1fr 1.25fr;
gap:6px;
padding:8px;
max-width:1200px;
margin:auto;
}

.card{
background:rgba(21,26,34,.92);
border:1px solid var(--line);
border-radius:16px;
padding:10px;
overflow:hidden;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
gap:8px;
}

h1{
margin:0;
font-size:15px;
}

button{
border:0;
border-radius:12px;
padding:10px 14px;
font-weight:900;
background:linear-gradient(135deg,var(--accent),#c9ffd7);
color:#071018;
}

.top{
display:grid;
grid-template-columns:1.2fr .8fr;
gap:6px;
}

.result{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(180deg,#18202b,#111720);
}

.label{
font-size:10px;
font-weight:800;
letter-spacing:.08em;
color:var(--muted);
text-transform:uppercase;
}

#type{
font-size:clamp(34px,7vw,72px);
font-weight:1000;
line-height:.9;
letter-spacing:-.07em;
margin:4px 0;
}

#reason{
font-size:12px;
line-height:1.2;
color:var(--muted);
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}

.stat{
background:var(--panel2);
border:1px solid var(--line);
border-radius:12px;
padding:8px;
}

.stat b{
display:block;
margin-top:2px;
font-size:clamp(18px,3vw,30px);
letter-spacing:-.04em;
}

.meters{
display:grid;
gap:6px;
align-content:center;
}

.meterTop{
display:flex;
justify-content:space-between;
font-size:12px;
color:var(--muted);
font-weight:800;
}

.bar{
height:12px;
background:#070a0f;
border:1px solid var(--line);
border-radius:999px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,var(--accent),var(--good));
}

.feedback{
display:grid;
gap:6px;
}

.msg{
padding:8px;
font-size:12px;
line-height:1.2;
border-radius:12px;
background:var(--panel2);
border:1px solid var(--line);
}

.trainer{
display:grid;
grid-template-rows:auto auto 1fr auto;
gap:6px;
}

.controls{
display:flex;
gap:6px;
align-items:center;
flex-wrap:wrap;
}

select{
background:#090d13;
color:var(--text);
border:1px solid var(--line);
border-radius:10px;
padding:7px;
font-size:13px;
font-weight:800;
}

.target{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:5px;
}

.mini{
background:var(--panel2);
border:1px solid var(--line);
border-radius:10px;
padding:5px;
text-align:center;
}

.mini span{
display:block;
font-size:9px;
color:var(--muted);
font-weight:800;
}

.mini b{
font-size:14px;
}

canvas{
width:100%;
height:100%;
background:#080b10;
border-radius:14px;
border:1px solid var(--line);
}

#tip{
margin:0;
font-size:12px;
font-weight:900;
color:var(--accent);
line-height:1.2;
}

@media(max-width:850px){
.wrap{
grid-template-rows:28% 24% 18% 30%;
}
#type{
font-size:34px;
}
}
</style>
</head>

<body>

<div class="wrap">

<header class="card">
<h1>보컬 연습 계기판</h1>
<button id="start">마이크 시작</button>
</header>

<section class="top card">

<div class="result card">
<div class="label">현재 발성 추정</div>
<div id="type">대기 중</div>
<div id="reason">한 음을 2초 정도 길게 내봐.</div>
</div>

<div class="stats">
<div class="stat">
<div class="label">Pitch</div>
<b id="pitch">-</b>
</div>

<div class="stat">
<div class="label">Note</div>
<b id="note">-</b>
</div>

<div class="stat">
<div class="label">F1</div>
<b id="f1">-</b>
</div>

<div class="stat">
<div class="label">F2</div>
<b id="f2">-</b>
</div>
</div>

</section>

<section class="card meters">

<div>
<div class="meterTop">
<span>성대접촉</span>
<span id="harmTxt">0%</span>
</div>
<div class="bar"><div class="fill" id="harmBar"></div></div>
</div>

<div>
<div class="meterTop">
<span>숨소리</span>
<span id="noiseTxt">0%</span>
</div>
<div class="bar"><div class="fill" id="noiseBar"></div></div>
</div>

<div>
<div class="meterTop">
<span>밝기</span>
<span id="brightTxt">0%</span>
</div>
<div class="bar"><div class="fill" id="brightBar"></div></div>
</div>

<div>
<div class="meterTop">
<span>안정도</span>
<span id="stableTxt">0%</span>
</div>
<div class="bar"><div class="fill" id="stableBar"></div></div>
</div>

<div>
<div class="meterTop">
<span>볼륨</span>
<span id="volTxt">0%</span>
</div>
<div class="bar"><div class="fill" id="volBar"></div></div>
</div>

</section>

<section class="card feedback" id="feedback">
<div class="msg">우→오→어→아 순서로 열면서 포먼트 이동을 느껴봐.</div>
<div class="msg">믹스는 큰 소리보다 접촉과 밝기를 유지하는 게 중요.</div>
</section>

<section class="card trainer">

<div class="controls">
<b>포먼트 튜닝</b>

<select id="vowel">
<option value="a">아</option>
<option value="eo">어</option>
<option value="o">오</option>
<option value="u">우</option>
<option value="i">이</option>
<option value="ae">애</option>
</select>

<select id="profile">
<option value="male">낮은/남성</option>
<option value="female">높은/여성</option>
</select>
</div>

<div class="target">
<div class="mini">
<span>목표F1</span>
<b id="tf1">-</b>
</div>

<div class="mini">
<span>현재F1</span>
<b id="cf1">-</b>
</div>

<div class="mini">
<span>목표F2</span>
<b id="tf2">-</b>
</div>

<div class="mini">
<span>현재F2</span>
<b id="cf2">-</b>
</div>
</div>

<canvas id="formants" width="680" height="280"></canvas>

<p id="tip">목표점 근처로 현재점을 움직여 봐.</p>

</section>

</div>

<script>

const $=id=>document.getElementById(id)

const E={
start:$("start"),
type:$("type"),
reason:$("reason"),
pitch:$("pitch"),
note:$("note"),
f1:$("f1"),
f2:$("f2"),

harmTxt:$("harmTxt"),
noiseTxt:$("noiseTxt"),
brightTxt:$("brightTxt"),
stableTxt:$("stableTxt"),
volTxt:$("volTxt"),

harmBar:$("harmBar"),
noiseBar:$("noiseBar"),
brightBar:$("brightBar"),
stableBar:$("stableBar"),
volBar:$("volBar"),

feedback:$("feedback"),

vowel:$("vowel"),
profile:$("profile"),

tf1:$("tf1"),
tf2:$("tf2"),
cf1:$("cf1"),
cf2:$("cf2"),

canvas:$("formants"),
tip:$("tip")
}

const targets={
male:{
a:[730,1090],
eo:[600,1200],
o:[570,840],
u:[300,870],
i:[270,2290],
ae:[660,1720]
},
female:{
a:[850,1220],
eo:[720,1400],
o:[590,920],
u:[370,950],
i:[310,2790],
ae:[780,1950]
}
}

let ac,an,src,freq,time,sr,hist=[],last={f1:0,f2:0}

E.start.onclick=async()=>{

try{

const stream=await navigator.mediaDevices.getUserMedia({
audio:{
echoCancellation:false,
noiseSuppression:false,
autoGainControl:false
}
})

ac=new(window.AudioContext||window.webkitAudioContext)()

sr=ac.sampleRate

an=ac.createAnalyser()
an.fftSize=4096
an.smoothingTimeConstant=.7

freq=new Uint8Array(an.frequencyBinCount)
time=new Float32Array(an.fftSize)

src=ac.createMediaStreamSource(stream)
src.connect(an)

E.start.textContent="분석 중"

loop()

}catch(e){

E.type.textContent="마이크 실패"
E.reason.textContent=e.message

}

}

function loop(){

an.getByteFrequencyData(freq)
an.getFloatTimeDomainData(time)

const rms=RMS(time)
const pitch=AC(time,sr)

const spec=SPEC(freq,sr,an.fftSize)
const fm=FORM(spec.peaks)

const harm=HARM(spec.peaks,pitch)
const noise=clamp(1-harm,0,1)
const bright=clamp((spec.centroid-900)/2600,0,1)

if(pitch>60&&pitch<1200&&rms>.01){

hist.push(pitch)

if(hist.length>35)hist.shift()

}

const stable=STAB(hist)

last=fm

const c=CLASS({
rms,pitch,harm,noise,bright,stable
})

render({
rms,pitch,fm,harm,noise,bright,stable,c
})

requestAnimationFrame(loop)

}

function RMS(b){

let s=0

for(const x of b)s+=x*x

return Math.sqrt(s/b.length)

}

function AC(b,sr){

if(RMS(b)<.01)return-1

let best=-1
let bc=0

const min=Math.floor(sr/1000)
const max=Math.floor(sr/60)

for(let lag=min;lag<max;lag++){

let c=0

for(let i=0;i<b.length-lag;i++){

c+=b[i]*b[i+lag]

}

c/=b.length-lag

if(c>bc){

bc=c
best=lag

}

}

return bc<.002?-1:sr/best

}

function SPEC(d,sr,fft){

const bin=sr/fft

const peaks=[]

let w=0
let t=0

for(let i=3;i<d.length-3;i++){

let hz=i*bin
let a=d[i]/255

w+=hz*a
t+=a

if(
hz>150&&
hz<4000&&
a>.08&&
d[i]>d[i-1]&&
d[i]>d[i+1]
){

peaks.push({
hz,
amp:a
})

}

}

peaks.sort((a,b)=>b.amp-a.amp)

return{
peaks:peaks.slice(0,35).sort((a,b)=>a.hz-b.hz),
centroid:t?w/t:0
}

}

function FORM(peaks){

const c=peaks.filter(p=>p.hz>200&&p.hz<3500)

const f1=c
.filter(p=>p.hz>=250&&p.hz<=1000)
.sort((a,b)=>b.amp-a.amp)[0]

const f2=c
.filter(p=>p.hz>=800&&p.hz<=3000)
.sort((a,b)=>b.amp-a.amp)[0]

return{
f1:f1?Math.round(f1.hz):0,
f2:f2?Math.round(f2.hz):0
}

}

function HARM(peaks,p){

if(!p||p<60)return 0

let h=0
let t=0

for(const x of peaks){

t+=x.amp

let n=Math.round(x.hz/p)

let near=n*p

if(
n>0&&
Math.abs(x.hz-near)<Math.max(25,p*.08)
){

h+=x.amp

}

}

return t?clamp(h/t,0,1):0

}

function STAB(h){

if(h.length<8)return 0

let m=h.reduce((a,b)=>a+b,0)/h.length

let sd=Math.sqrt(
h.reduce((a,b)=>a+(b-m)**2,0)/h.length
)

return clamp(1-sd/40,0,1)

}

function CLASS(a){

if(a.rms<.012||a.pitch<60){

return[
"대기 중",
"분석할 만큼 소리가 아직 작아.",
[
"한 음을 2초 길게 내봐.",
"마이크는 15~30cm 정도 떨어뜨려."
]
]

}

let type="믹스 근처"

let reason="접촉, 밝기, 숨샘이 중간권이라 믹스 연습 구간으로 보여."

let msg=[
"볼륨보다 접촉과 밝기를 같이 유지해."
]

if(a.noise>.55&&a.harm<.48){

type="가성/숨샘 큼"

reason="배음보다 노이즈가 많아서 바람 섞인 소리로 보여."

msg=[
"숨이 많이 새. ‘으/구’ 느낌으로 접촉을 조금 더.",
"소리를 키우지 말고 바람 새는 양만 줄여봐."
]

}

else if(a.bright<.28&&a.harm>.62&&a.pitch<360){

type="진성 비중 큼"

reason="배음은 강한데 어둡고 무거워."

msg=[
"고음 갈수록 모음을 조금 좁혀.",
"힘으로 밀지 말고 볼륨을 20% 줄여."
]

}

else if(a.bright>.55&&a.harm>.58&&a.noise<.45){

type="두성/밝은 믹스"

reason="밝은 배음과 접촉이 같이 살아있어."

msg=[
"좋아. 얇아지면 ‘네/냐’ 느낌으로 진성감 추가.",
"날카로우면 ‘어/오’로 살짝 둥글려."
]

}

if(a.stable<.45){

msg.push(
"음정 흔들림 있음. 작은 소리로 2초 유지."
)

}

if(a.rms>.17){

msg.push(
"입력이 너무 큼. 힘이 들어갔을 수 있어."
)

}

return[
type,
reason,
msg
]

}

function render(o){

E.type.textContent=o.c[0]
E.reason.textContent=o.c[1]

E.pitch.textContent=
o.pitch>0?
Math.round(o.pitch)+"Hz":"-"

E.note.textContent=
o.pitch>0?
NOTE(o.pitch):"-"

E.f1.textContent=
o.fm.f1?
o.fm.f1+"Hz":"-"

E.f2.textContent=
o.fm.f2?
o.fm.f2+"Hz":"-"

bar("harm",o.harm)
bar("noise",o.noise)
bar("bright",o.bright)
bar("stable",o.stable)
bar("vol",clamp(o.rms*5,0,1))

E.feedback.innerHTML=
o.c[2]
.slice(0,2)
.map(x=>`<div class="msg">${x}</div>`)
.join("")

drawFormants(o.fm)

}

function bar(k,v){

E[k+"Txt"].textContent=
Math.round(v*100)+"%"

E[k+"Bar"].style.width=
Math.round(v*100)+"%"

}

function NOTE(hz){

const n=[
"C","C#","D","D#","E","F",
"F#","G","G#","A","A#","B"
]

const m=Math.round(
69+12*Math.log2(hz/440)
)

return(
n[(m+1200)%12]+
Math.floor(m/12-1)
)

}

function drawFormants(fm){

const[
tf1,
tf2
]=targets[E.profile.value][E.vowel.value]

E.tf1.textContent=tf1+"Hz"
E.tf2.textContent=tf2+"Hz"

E.cf1.textContent=
fm.f1?
fm.f1+"Hz":"-"

E.cf2.textContent=
fm.f2?
fm.f2+"Hz":"-"

const c=E.canvas
const ctx=c.getContext("2d")

const w=c.width
const h=c.height

ctx.clearRect(0,0,w,h)

const x=f2=>w-((f2-500)/2600)*w
const y=f1=>((f1-200)/850)*h

ctx.strokeStyle="#273142"

for(let i=1;i<5;i++){

ctx.beginPath()
ctx.moveTo(i*w/5,0)
ctx.lineTo(i*w/5,h)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(0,i*h/5)
ctx.lineTo(w,i*h/5)
ctx.stroke()

}

ctx.fillStyle="#a8ffbf"

ctx.beginPath()
ctx.arc(x(tf2),y(tf1),16,0,Math.PI*2)
ctx.fill()

ctx.fillText(
"목표",
x(tf2)+20,
y(tf1)+5
)

if(fm.f1&&fm.f2){

ctx.fillStyle="#9ee7ff"

ctx.beginPath()
ctx.arc(x(fm.f2),y(fm.f1),12,0,Math.PI*2)
ctx.fill()

ctx.fillText(
"현재",
x(fm.f2)+16,
y(fm.f1)+5
)

const d=Math.hypot(
(fm.f1-tf1)/120,
(fm.f2-tf2)/250
)

E.tip.textContent=
d<1?
"좋아. 목표 모음에 꽤 가까워.":
fm.f1>tf1+120?
"입을 조금 덜 벌려서 F1 낮춰.":
fm.f1<tf1-120?
"턱/입 열림 조금 더 줘.":
fm.f2>tf2+250?
"너무 밝고 앞쪽. 살짝 둥글려.":
fm.f2<tf2-250?
"조금 더 앞쪽/미소감 줘.":
"거의 근처. 흔들지 말고 유지."

}else{

E.tip.textContent=
"모음을 길게 내면 현재점이 잡혀."

}

}

function clamp(x,a,b){

return Math.min(
b,
Math.max(a,x)
)

}

E.vowel.onchange=()=>drawFormants(last)
E.profile.onchange=()=>drawFormants(last)

drawFormants(last)

</script>

</body>
</html>
